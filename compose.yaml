# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chore_game
      POSTGRES_USER: chore_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chore_password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chore_user -d chore_game"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://chore_user:${POSTGRES_PASSWORD:-chore_password}@db:5432/chore_game
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-random-secret}
      JWT_EXPIRES_IN: 7d
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
    ports:
      - "3000:3000"

volumes:
  db-data:
