apiVersion: v1
kind: Secret
metadata:
  name: chore-game-secrets
  namespace: chore-game
type: Opaque
stringData:
  POSTGRES_PASSWORD: "replace-postgres-password"
  DATABASE_URL: "postgresql://chore_user:replace-postgres-password@postgres:5432/chore_game"
  JWT_SECRET: "replace-with-long-random-secret"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "replace-admin-password"
