apiVersion: apps/v1
kind: Deployment
metadata:
  name: chore-game
  namespace: chore-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chore-game
  template:
    metadata:
      labels:
        app: chore-game
    spec:
      containers:
        - name: chore-game
          image: ghcr.io/yothman/chore-game:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chore-game-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: chore-game-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chore-game-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chore-game-secrets
                  key: JWT_SECRET
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chore-game-secrets
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chore-game-secrets
                  key: ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: chore-game
  namespace: chore-game
spec:
  selector:
    app: chore-game
  ports:
    - port: 80
      targetPort: 3000
